<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Lambda calculus interpreter</title>
    </head>

    <body>
        <script src="./target/lambda.js"></script>
        <link rel="stylesheet" href="./index.css" />

        <h1>Lambda calculus interpreter.</h1>

        <p>Input lambda expression and press <b>reduce</b>:</p>

        <div class="menu">
            <div class="menu-item">
                <input
                    type="checkbox"
                    id="intermediate"
                    name="intermediate"
                    checked
                />
                <label for="intermediate">
                    Intermediate steps
                    <span class="tooltip">
                        Show all intermediate reduction steps.
                        <br />
                        Keybinding: I
                    </span>
                </label>
            </div>
            <div class="menu-item">
                <input type="checkbox" id="lazy" name="lazy" unchecked />
                <label for="lazy">
                    Lazy evaluation
                    <span class="tooltip">
                        Don't reduce expressions under lambda abstraction.
                        <br />
                        Keybinding: L
                    </span>
                </label>
            </div>
        </div>

        <div class="lambda-body">
            <input type="text" id="lambda-inp" required />
            <div>
                <div class="button-wrapper">
                    <button type="button" onclick="reduce()">Reduce</button>
                    <span class="tooltip"> Keybinding: Enter</span>
                </div>

                <div class="button-wrapper">
                    <button type="button" onclick="reduceFull()">
                        Full reduce
                    </button>
                    <span class="tooltip"> Keybinding: Shift+Enter</span>
                </div>

                <div class="button-wrapper">
                    <button
                        type="button"
                        onclick="clearTerms()"
                        class="button-clear"
                    >
                        Clear
                    </button>
                    <span class="tooltip"> Keybinding: C </span>
                </div>
            </div>
            <div class="lambda-display">
                <div id="lambda-terms"></div>
                <div class="var-lib-container">
                    <div id="var-lib-panel"></div>
                    <div class="var-lib-buttons-container">
                        <div class="button-wrapper">
                            <button
                                type="button"
                                onclick="
                                    {
                                        c_var_lib_fill_std();
                                        updateVarLibPanel();
                                    }
                                "
                            >
                                Load
                            </button>
                            <span class="tooltip">
                                Load variables from standard library.
                                Keybinding: S
                            </span>
                        </div>
                        <div class="button-wrapper">
                            <button
                                type="button"
                                class="button-clear"
                                onclick="
                                    {
                                        c_var_lib_clear();
                                        updateVarLibPanel();
                                    }
                                "
                            >
                                Clear
                            </button>
                            <span class="tooltip">
                                Clear all variables. Keybinding: X
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="popup" class="hidden"></div>

        <script src="index.js"></script>
    </body>
</html>
