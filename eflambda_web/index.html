<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Lambda calculus interpreter</title>
    </head>

    <body>
        <script src="./target/lambda.js"></script>
        <link rel="stylesheet" href="./index.css" />

        <h1>Lambda calculus interpreter.</h1>

        <p>Input lambda expression and press <b>reduce</b>:</p>

        <div class="menu">
            <div class="menu-item">
                <input
                    type="checkbox"
                    id="intermediate"
                    name="intermediate"
                    checked
                />
                <label for="intermediate">
                    Intermediate steps
                    <span class="tooltip">
                        Show all intermediate reduction steps.
                        <br />
                        Keybinding: I
                    </span>
                </label>
            </div>
            <div class="menu-item">
                <input type="checkbox" id="lazy" name="lazy" unchecked />
                <label for="lazy">
                    Lazy evaluation
                    <span class="tooltip">
                        Don't reduce expressions under lambda abstraction.
                        <br />
                        Keybinding: L
                    </span>
                </label>
            </div>
        </div>

        <div class="lambda_body">
            <input type="text" id="lambda_inp" required />
            <div>
                <button type="button" onclick="reduce()">Reduce</button>
                <button type="button" onclick="reduceFull()">
                    Full reduce
                </button>
                <button
                    type="button"
                    onclick="clearTerms()"
                    class="button-clear"
                >
                    Clear
                </button>
            </div>
            <div id="lambda_terms"></div>
        </div>

        <div id="popup" class="hidden"></div>

        <script src="index.js"></script>
    </body>
</html>
